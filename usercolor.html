 <!DOCTYPE html>
<html>
<head>
<title>Rectangle</title>
<style>
body{
    text-align:center;
    background:white;
}

button{
    margin-top:10px;
    padding:8px 15px;
}
</style>
</head>

<body>


Layer 1 :
<input type="color" id="c1" value="#ffff00"><br><br>

Layer 2 :
<input type="color" id="c2" value="#0000ff"><br><br>

Layer 3 :
<input type="color" id="c3" value="#00ff00"><br><br>

Layer 4 :
<input type="color" id="c4" value="#ff0000"><br><br>

<button onclick="drawrec()">Draw rectangle</button>

<br><br>

<canvas id="myCanvas" width="500" height="500"></canvas>

<script>

const canvas=document.getElementById("myCanvas");
const gl=canvas.getContext("webgl");

const vs=`
attribute vec2 coordinates;
void main(){
gl_Position=vec4(coordinates,0.0,1.0);
}
`;

const fs=`
precision mediump float;
uniform vec4 uColor;

void main(){
gl_FragColor=uColor;
}
`;function createShader(type, source){
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    return shader;
}

const vertexShader = createShader(gl.VERTEX_SHADER, vs);
const fragmentShader = createShader(gl.FRAGMENT_SHADER, fs);

const program = gl.createProgram();
gl.attachShader(program, vertexShader);
gl.attachShader(program, fragmentShader);
gl.linkProgram(program);
gl.useProgram(program);

const vertices = new Float32Array([

 // Layer 1
 -0.45,-0.95,
  0.45,-0.95,
  0.45,-0.72,
 -0.45,-0.72,

 // Layer 2
 -0.34,-0.72,
  0.34,-0.72,
  0.34,-0.49,
 -0.34,-0.49,

 // Layer 3
 -0.23,-0.49,
  0.23,-0.49,
  0.23,-0.26,
 -0.23,-0.26,

 // Layer 4
 -0.12,-0.26,
  0.12,-0.26,
  0.12,-0.03,
 -0.12,-0.03

]);

const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

const coord = gl.getAttribLocation(program,"coordinates");
gl.vertexAttribPointer(coord,2,gl.FLOAT,false,0,0);
gl.enableVertexAttribArray(coord);

const colorLoc = gl.getUniformLocation(program,"uColor");

	function hexToRgb(hex){

    let r=parseInt(hex.substring(1,3),16)/255;
    let g=parseInt(hex.substring(3,5),16)/255;
    let b=parseInt(hex.substring(5,7),16)/255;

    return [r,g,b];
}

function drawrec(){

    gl.clearColor(1.0,1.0,1.0,1.0);
    gl.clear(gl.COLOR_BUFFER_BIT);

    let c1=hexToRgb(document.getElementById("c1").value);
    let c2=hexToRgb(document.getElementById("c2").value);
    let c3=hexToRgb(document.getElementById("c3").value);
    let c4=hexToRgb(document.getElementById("c4").value);

    gl.uniform4f(colorLoc,c1[0],c1[1],c1[2],1.0);
    gl.drawArrays(gl.TRIANGLE_FAN,0,4);

    gl.uniform4f(colorLoc,c2[0],c2[1],c2[2],1.0);
    gl.drawArrays(gl.TRIANGLE_FAN,4,4);

    gl.uniform4f(colorLoc,c3[0],c3[1],c3[2],1.0);
    gl.drawArrays(gl.TRIANGLE_FAN,8,4);

    gl.uniform4f(colorLoc,c4[0],c4[1],c4[2],1.0);
    gl.drawArrays(gl.TRIANGLE_FAN,12,4);
}

drawrec();

</script>

</body>
</html>
